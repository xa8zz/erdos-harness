<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="100%" height="100%" fill="#000"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fff"/>
    </marker>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffd43b"/>
    </marker>
    <marker id="arrow-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="50" text-anchor="middle" fill="#fff" font-size="24" font-weight="600">co-researcher</text>

  <!-- User -->
  <rect x="230" y="105" width="160" height="50" rx="8" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="310" y="128" text-anchor="middle" fill="#fff" font-size="14" font-weight="500">User</text>
  <text x="310" y="146" text-anchor="middle" fill="#888" font-size="11">you, the researcher</text>

  <!-- User to Curator -->
  <line x1="310" y1="155" x2="310" y2="200" stroke="#fff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="322" y="182" fill="#aaa" font-size="10">asks / pastes</text>

  <!-- Curator -->
  <rect x="120" y="205" width="380" height="145" rx="10" fill="none" stroke="#5fb3ff" stroke-width="2"/>
  <text x="310" y="232" text-anchor="middle" fill="#5fb3ff" font-size="17" font-weight="600">Curator Agent</text>
  <text x="310" y="252" text-anchor="middle" fill="#ccc" font-size="12">Claude Code / Codex</text>
  <text x="310" y="282" text-anchor="middle" fill="#aaa" font-size="11">composes neutral math-first prompts</text>
  <text x="310" y="300" text-anchor="middle" fill="#aaa" font-size="11">routes parallel verification</text>
  <text x="310" y="318" text-anchor="middle" fill="#aaa" font-size="11">saves round docs · commits per round</text>
  <text x="310" y="336" text-anchor="middle" fill="#666" font-size="10">does not solve; keeps the loop clean</text>

  <!-- Curator to Research Models -->
  <line x1="500" y1="235" x2="645" y2="240" stroke="#fff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="573" y="229" text-anchor="middle" fill="#aaa" font-size="10">dispatch</text>
  <line x1="645" y1="265" x2="500" y2="258" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-dim)"/>
  <text x="573" y="280" text-anchor="middle" fill="#666" font-size="10">response</text>

  <!-- Research Models -->
  <rect x="650" y="200" width="330" height="90" rx="8" fill="none" stroke="#b48eff" stroke-width="1.5"/>
  <text x="815" y="225" text-anchor="middle" fill="#b48eff" font-size="15" font-weight="600">Research Models</text>
  <text x="815" y="246" text-anchor="middle" fill="#ccc" font-size="11">GPT Pro · DeepThink · Codex · Gemini</text>
  <text x="815" y="264" text-anchor="middle" fill="#aaa" font-size="11">fresh threads, neutral framing</text>
  <text x="815" y="281" text-anchor="middle" fill="#666" font-size="10">A/B/C branched dispatch across families</text>

  <!-- Curator to Verifiers -->
  <line x1="500" y1="295" x2="645" y2="340" stroke="#fff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="545" y="305" fill="#aaa" font-size="10">audit prompt</text>
  <line x1="645" y1="370" x2="500" y2="315" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-dim)"/>

  <!-- Verifiers -->
  <rect x="650" y="305" width="330" height="90" rx="8" fill="none" stroke="#ffa94d" stroke-width="1.5"/>
  <text x="815" y="330" text-anchor="middle" fill="#ffa94d" font-size="15" font-weight="600">Verifier Tabs</text>
  <text x="815" y="351" text-anchor="middle" fill="#ccc" font-size="11">≥ 2 parallel adversarial audits</text>
  <text x="815" y="369" text-anchor="middle" fill="#aaa" font-size="11">cross-family · "find what breaks"</text>
  <text x="815" y="386" text-anchor="middle" fill="#666" font-size="10">convergence across families = truth signal</text>

  <!-- Curator to Aristotle -->
  <line x1="500" y1="330" x2="645" y2="440" stroke="#fff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="540" y="395" fill="#aaa" font-size="10">theorem claim</text>
  <line x1="645" y1="470" x2="500" y2="345" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-dim)"/>

  <!-- Aristotle -->
  <rect x="650" y="410" width="330" height="90" rx="8" fill="none" stroke="#51cf66" stroke-width="1.5"/>
  <text x="815" y="435" text-anchor="middle" fill="#51cf66" font-size="15" font-weight="600">Aristotle → Lean 4</text>
  <text x="815" y="456" text-anchor="middle" fill="#ccc" font-size="11">formal verification</text>
  <text x="815" y="474" text-anchor="middle" fill="#aaa" font-size="11">theorems · lemmas · reductions</text>
  <text x="815" y="491" text-anchor="middle" fill="#666" font-size="10">zero-sorry → strong promote signal</text>

  <!-- Curator to Round Doc -->
  <line x1="310" y1="355" x2="310" y2="510" stroke="#fff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="322" y="430" fill="#aaa" font-size="11">write round doc</text>
  <text x="322" y="445" fill="#666" font-size="10">byte-faithful from session jsonl</text>

  <!-- Round Doc -->
  <rect x="80" y="515" width="460" height="115" rx="8" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="310" y="542" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Round Doc</text>
  <text x="310" y="565" text-anchor="middle" fill="#aaa" font-size="11">YAML frontmatter: id / type / claim / action</text>
  <text x="310" y="583" text-anchor="middle" fill="#aaa" font-size="11">failure_mechanism for refutations / supersedes</text>
  <text x="310" y="601" text-anchor="middle" fill="#aaa" font-size="11">immutable · action-graph linked</text>
  <text x="310" y="621" text-anchor="middle" fill="#666" font-size="10">git commit: durability layer</text>

  <!-- Round Doc to State View -->
  <line x1="310" y1="630" x2="310" y2="680" stroke="#fff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="322" y="662" fill="#aaa" font-size="10">compile_rounds.py</text>

  <!-- State View -->
  <rect x="80" y="685" width="460" height="95" rx="8" fill="none" stroke="#ffd43b" stroke-width="1.5"/>
  <text x="310" y="712" text-anchor="middle" fill="#ffd43b" font-size="15" font-weight="600">State View</text>
  <text x="310" y="733" text-anchor="middle" fill="#ccc" font-size="11">Established · Ruled Out · Numerical · Open Question</text>
  <text x="310" y="751" text-anchor="middle" fill="#aaa" font-size="11">derived from action graph · regenerable · never hand-edited</text>
  <text x="310" y="769" text-anchor="middle" fill="#666" font-size="10">source of truth for the next prompt</text>

  <!-- Loop back: State View to Curator, routed outside all right-side boxes -->
  <polyline points="540,725 1050,725 1050,180 80,180 80,275 118,275" stroke="#ffd43b" stroke-width="1.5" fill="none" marker-end="url(#arrow-yellow)"/>
  <text x="1040" y="455" fill="#ffd43b" font-size="11" text-anchor="middle" transform="rotate(-90 1040 455)">feeds the next prompt</text>
</svg>
